<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathFun - Game</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="sounds.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>MathFun</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="game.html">Play Game</a>
                <a href="leaderboard.html">Leaderboard</a>
                <a href="#" onclick="logout(); return false;" id="logout-link" style="display: none;">Logout</a>
            </nav>
        </header>
        <main>
            <div class="game-info">
                <div>Time: <span id="timer">45s</span></div>
                <div>Score: <span id="score">0</span></div>
                <div><button id="sound-toggle" class="sound-btn" title="Toggle Sound">🔊</button></div>
            </div>
            <div class="question">15 × 7 = ?</div>
            <input type="text" class="answer-input" placeholder="Your Answer">
            <button class="btn btn-primary">SUBMIT</button>
            <p class="feedback"></p>
        </main>
    </div>
    <script src="game.js"></script>
</body>
</html>
