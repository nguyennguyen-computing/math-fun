<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathFun - Home</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>MathFun</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="game.html">Play Game</a>
                <a href="leaderboard.html">Leaderboard</a>
            </nav>
        </header>
        <main>
            <p class="tagline">Test your math skills!</p>
            
            <!-- Auth Section (Login/Register) -->
            <div id="auth-section">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="showLogin()">Login</button>
                    <button class="auth-tab" onclick="showRegister()">Register</button>
                </div>
                
                <div id="login-form" class="auth-form">
                    <input type="email" id="login-email" class="answer-input" placeholder="Email">
                    <input type="password" id="login-password" class="answer-input" placeholder="Password">
                    <button class="btn btn-primary" onclick="handleLogin()">LOGIN</button>
                    <p id="login-error" class="error-message"></p>
                </div>
                
                <div id="register-form" class="auth-form" style="display: none;">
                    <input type="email" id="register-email" class="answer-input" placeholder="Email">
                    <input type="password" id="register-password" class="answer-input" placeholder="Password">
                    <input type="password" id="register-confirm" class="answer-input" placeholder="Confirm Password">
                    <button class="btn btn-primary" onclick="handleRegister()">REGISTER</button>
                    <p id="register-error" class="error-message"></p>
                </div>
            </div>
            
            <!-- User Info Section (After Login) -->
            <div id="user-info" style="display: none;">
                <p class="user-welcome">Welcome, <span id="user-name"></span>!</p>
                <a href="game.html" class="btn btn-primary">PLAY NOW</a>
                <a href="leaderboard.html" class="btn btn-secondary">VIEW LEADERBOARD</a>
                <button class="btn btn-secondary" onclick="logout()">LOGOUT</button>
            </div>
        </main>
    </div>
    <script src="auth.js"></script>
    <script>
        function showLogin() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
            document.querySelectorAll('.auth-tab')[0].classList.add('active');
            document.querySelectorAll('.auth-tab')[1].classList.remove('active');
        }
        
        function showRegister() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
            document.querySelectorAll('.auth-tab')[0].classList.remove('active');
            document.querySelectorAll('.auth-tab')[1].classList.add('active');
        }
        
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            
            if (!email || !password) {
                errorEl.textContent = 'Please fill in all fields';
                return;
            }
            
            const result = await login(email, password);
            if (result.success) {
                errorEl.textContent = '';
            } else {
                errorEl.textContent = result.error;
            }
        }
        
        async function handleRegister() {
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const errorEl = document.getElementById('register-error');
            
            if (!email || !password || !confirm) {
                errorEl.textContent = 'Please fill in all fields';
                return;
            }
            
            if (password !== confirm) {
                errorEl.textContent = 'Passwords do not match';
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            const result = await register(email, password);
            if (result.success) {
                errorEl.textContent = '';
            } else {
                errorEl.textContent = result.error;
            }
        }
    </script>
</body>
</html>
